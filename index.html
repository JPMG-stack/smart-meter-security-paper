<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Meter Cybersecurity Research - IEEE CCWC 2026</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary: #0066cc;
            --primary-dark: #004499;
            --primary-light: #3399ff;
            --accent: #ff6600;
            --accent-hover: #e65c00;
            --success: #00cc66;
            --warning: #ffaa00;
            --danger: #ff3366;
            --light: #f8f9fa;
            --lighter: #ffffff;
            --dark: #1a1a2e;
            --gray: #6c757d;
            --gradient-primary: linear-gradient(135deg, #0066cc 0%, #004499 100%);
            --gradient-accent: linear-gradient(135deg, #ff6600 0%, #ff8800 100%);
            --gradient-hero: linear-gradient(135deg, #0a1628 0%, #1a3a5c 50%, #0066cc 100%);
            --shadow-sm: 0 2px 4px rgba(0,0,0,0.08);
            --shadow-md: 0 4px 12px rgba(0,0,0,0.12);
            --shadow-lg: 0 8px 24px rgba(0,0,0,0.16);
            --shadow-xl: 0 16px 48px rgba(0,0,0,0.2);
            --border-radius: 12px;
            --border-radius-lg: 20px;
            --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html {
            scroll-behavior: smooth;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            line-height: 1.7;
            color: var(--dark);
            background: var(--light);
            overflow-x: hidden;
        }

        /* Animated Background */
        .bg-animation {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            background: var(--gradient-hero);
            overflow: hidden;
        }

        .bg-animation::before {
            content: '';
            position: absolute;
            width: 200%;
            height: 200%;
            top: -50%;
            left: -50%;
            background: radial-gradient(circle, rgba(0,102,204,0.1) 0%, transparent 70%);
            animation: pulse 15s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1) rotate(0deg); }
            50% { transform: scale(1.1) rotate(5deg); }
        }

        /* Floating Particles */
        .particle {
            position: absolute;
            width: 4px;
            height: 4px;
            background: rgba(0,102,204,0.3);
            border-radius: 50%;
            animation: float 20s infinite;
        }

        @keyframes float {
            0%, 100% { transform: translateY(100vh) rotate(0deg); opacity: 0; }
            10% { opacity: 1; }
            90% { opacity: 1; }
            100% { transform: translateY(-100vh) rotate(720deg); opacity: 0; }
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 20px;
            position: relative;
            z-index: 1;
        }

        /* Navigation */
        nav {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            background: rgba(255,255,255,0.95);
            backdrop-filter: blur(20px);
            box-shadow: var(--shadow-sm);
            z-index: 1000;
            padding: 15px 0;
        }

        nav .container {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo {
            font-size: 1.3em;
            font-weight: 700;
            color: var(--primary);
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .logo i {
            font-size: 1.5em;
        }

        .nav-links {
            display: flex;
            gap: 30px;
            list-style: none;
        }

        .nav-links a {
            color: var(--dark);
            text-decoration: none;
            font-weight: 500;
            transition: var(--transition);
            position: relative;
        }

        .nav-links a::after {
            content: '';
            position: absolute;
            bottom: -5px;
            left: 0;
            width: 0;
            height: 2px;
            background: var(--primary);
            transition: var(--transition);
        }

        .nav-links a:hover::after {
            width: 100%;
        }

        .nav-links a:hover {
            color: var(--primary);
        }

        /* Hero Section */
        header {
            min-height: 100vh;
            display: flex;
            align-items: center;
            padding: 120px 0 80px;
            position: relative;
        }

        .hero-content {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 60px;
            align-items: center;
        }

        .hero-text h1 {
            font-size: 2.8em;
            font-weight: 800;
            color: var(--lighter);
            line-height: 1.2;
            margin-bottom: 20px;
            animation: fadeInUp 0.8s ease-out;
        }

        .hero-text .subtitle {
            font-size: 1.3em;
            color: rgba(255,255,255,0.9);
            margin-bottom: 30px;
            animation: fadeInUp 0.8s ease-out 0.2s both;
        }

        .hero-badges {
            display: flex;
            gap: 15px;
            margin-bottom: 30px;
            animation: fadeInUp 0.8s ease-out 0.4s both;
        }

        .badge {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 8px 16px;
            border-radius: 50px;
            font-size: 0.85em;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .badge-ieee {
            background: var(--gradient-accent);
            color: white;
        }

        .badge-peer {
            background: rgba(255,255,255,0.2);
            color: white;
            backdrop-filter: blur(10px);
        }

        .hero-buttons {
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
            animation: fadeInUp 0.8s ease-out 0.6s both;
        }

        .btn {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            padding: 14px 28px;
            border-radius: 50px;
            text-decoration: none;
            font-weight: 600;
            transition: var(--transition);
            border: none;
            cursor: pointer;
            font-size: 1em;
        }

        .btn-primary {
            background: var(--gradient-accent);
            color: white;
            box-shadow: 0 4px 15px rgba(255,102,0,0.4);
        }

        .btn-primary:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 25px rgba(255,102,0,0.5);
        }

        .btn-secondary {
            background: rgba(255,255,255,0.15);
            color: white;
            backdrop-filter: blur(10px);
            border: 2px solid rgba(255,255,255,0.3);
        }

        .btn-secondary:hover {
            background: rgba(255,255,255,0.25);
            transform: translateY(-3px);
        }

        .hero-image {
            display: flex;
            justify-content: center;
            align-items: center;
            animation: fadeInRight 1s ease-out 0.4s both;
        }

        .hero-image img {
            max-width: 100%;
            height: auto;
            border-radius: var(--border-radius-lg);
            box-shadow: var(--shadow-xl);
            animation: floatImage 6s ease-in-out infinite;
        }

        @keyframes floatImage {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-20px); }
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes fadeInRight {
            from {
                opacity: 0;
                transform: translateX(30px);
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        /* Sections */
        .section {
            padding: 100px 0;
            background: var(--lighter);
        }

        .section:nth-child(even) {
            background: var(--light);
        }

        .section-title {
            text-align: center;
            margin-bottom: 60px;
        }

        .section-title h2 {
            font-size: 2.5em;
            font-weight: 700;
            color: var(--dark);
            margin-bottom: 15px;
            position: relative;
            display: inline-block;
        }

        .section-title h2::after {
            content: '';
            position: absolute;
            bottom: -10px;
            left: 50%;
            transform: translateX(-50%);
            width: 80px;
            height: 4px;
            background: var(--gradient-primary);
            border-radius: 2px;
        }

        .section-title p {
            color: var(--gray);
            font-size: 1.1em;
            max-width: 600px;
            margin: 20px auto 0;
        }

        /* Authors Card */
        .authors-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 30px;
            margin-bottom: 40px;
        }

        .author-card {
            background: var(--lighter);
            padding: 30px;
            border-radius: var(--border-radius-lg);
            box-shadow: var(--shadow-md);
            transition: var(--transition);
            border: 1px solid rgba(0,0,0,0.05);
        }

        .author-card:hover {
            transform: translateY(-5px);
            box-shadow: var(--shadow-lg);
        }

        .author-card h3 {
            color: var(--primary);
            margin-bottom: 10px;
            font-size: 1.3em;
        }

        .author-card .affiliation {
            color: var(--gray);
            font-size: 0.95em;
            margin-bottom: 15px;
        }

        .author-card .email {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            color: var(--primary);
            text-decoration: none;
            font-weight: 500;
        }

        .author-card .email:hover {
            text-decoration: underline;
        }

        /* Stats Cards */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 25px;
            margin: 40px 0;
        }

        .stat-card {
            background: var(--gradient-primary);
            padding: 35px 25px;
            border-radius: var(--border-radius-lg);
            text-align: center;
            color: white;
            box-shadow: var(--shadow-md);
            transition: var(--transition);
            position: relative;
            overflow: hidden;
        }

        .stat-card::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle, rgba(255,255,255,0.1) 0%, transparent 70%);
            opacity: 0;
            transition: var(--transition);
        }

        .stat-card:hover::before {
            opacity: 1;
        }

        .stat-card:hover {
            transform: translateY(-8px);
            box-shadow: var(--shadow-xl);
        }

        .stat-card .value {
            font-size: 3em;
            font-weight: 800;
            margin-bottom: 10px;
            display: block;
        }

        .stat-card .label {
            font-size: 1em;
            opacity: 0.95;
            font-weight: 500;
        }

        .stat-card.accent {
            background: var(--gradient-accent);
        }

        .stat-card.success {
            background: linear-gradient(135deg, #00cc66 0%, #009944 100%);
        }

        /* Content Cards */
        .content-card {
            background: var(--lighter);
            padding: 40px;
            border-radius: var(--border-radius-lg);
            box-shadow: var(--shadow-md);
            margin-bottom: 30px;
            border-left: 5px solid var(--primary);
        }

        .content-card h3 {
            color: var(--primary);
            margin-bottom: 20px;
            font-size: 1.5em;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .content-card h3 i {
            font-size: 1.2em;
        }

        /* Tables */
        .table-container {
            overflow-x: auto;
            border-radius: var(--border-radius);
            box-shadow: var(--shadow-md);
            margin: 30px 0;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            background: var(--lighter);
        }

        th {
            background: var(--gradient-primary);
            color: white;
            padding: 18px 15px;
            text-align: left;
            font-weight: 600;
            font-size: 0.9em;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        td {
            padding: 15px;
            border-bottom: 1px solid #eee;
            font-size: 0.95em;
        }

        tr:hover {
            background: rgba(0,102,204,0.05);
        }

        tr:last-child td {
            border-bottom: none;
        }

        .severity-critical {
            color: var(--danger);
            font-weight: 700;
        }

        .severity-high {
            color: var(--warning);
            font-weight: 600;
        }

        .severity-medium {
            color: var(--accent);
            font-weight: 500;
        }

        .severity-low {
            color: var(--success);
            font-weight: 500;
        }

        /* Highlight Box */
        .highlight-box {
            background: linear-gradient(135deg, rgba(0,102,204,0.08) 0%, rgba(0,68,153,0.08) 100%);
            border-left: 5px solid var(--primary);
            padding: 25px;
            border-radius: var(--border-radius);
            margin: 25px 0;
        }

        .highlight-box ul {
            margin-left: 20px;
            margin-top: 15px;
        }

        .highlight-box li {
            margin: 10px 0;
            color: var(--dark);
        }

        /* Download Section */
        .download-section {
            background: var(--gradient-hero);
            padding: 60px;
            border-radius: var(--border-radius-lg);
            text-align: center;
            color: white;
            margin: 40px 0;
        }

        .download-section h3 {
            font-size: 2em;
            margin-bottom: 15px;
        }

        .download-section p {
            opacity: 0.9;
            margin-bottom: 30px;
            font-size: 1.1em;
        }

        .download-buttons {
            display: flex;
            justify-content: center;
            gap: 20px;
            flex-wrap: wrap;
        }

        .btn-download {
            background: var(--gradient-accent);
            color: white;
            padding: 16px 35px;
            border-radius: 50px;
            text-decoration: none;
            font-weight: 600;
            display: inline-flex;
            align-items: center;
            gap: 10px;
            transition: var(--transition);
            box-shadow: 0 4px 15px rgba(255,102,0,0.4);
        }

        .btn-download:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 25px rgba(255,102,0,0.5);
        }

        .btn-outline {
            background: rgba(255,255,255,0.15);
            color: white;
            padding: 16px 35px;
            border-radius: 50px;
            text-decoration: none;
            font-weight: 600;
            display: inline-flex;
            align-items: center;
            gap: 10px;
            transition: var(--transition);
            border: 2px solid rgba(255,255,255,0.3);
        }

        .btn-outline:hover {
            background: rgba(255,255,255,0.25);
            transform: translateY(-3px);
        }

        /* Citation Box */
        .citation-box {
            background: #f8f9fa;
            border: 2px dashed var(--primary);
            padding: 25px;
            border-radius: var(--border-radius);
            font-family: 'Courier New', monospace;
            font-size: 0.9em;
            color: var(--dark);
            margin: 20px 0;
            position: relative;
        }

        .citation-box::before {
            content: '📚 BibTeX';
            position: absolute;
            top: -12px;
            left: 20px;
            background: var(--lighter);
            padding: 0 10px;
            font-size: 0.85em;
            font-weight: 600;
            color: var(--primary);
        }

        /* Footer */
        footer {
            background: var(--dark);
            color: white;
            padding: 60px 0 30px;
            text-align: center;
        }

        .footer-content {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 40px;
            margin-bottom: 40px;
            text-align: left;
        }

        .footer-section h4 {
            font-size: 1.2em;
            margin-bottom: 20px;
            color: var(--primary-light);
        }

        .footer-section ul {
            list-style: none;
        }

        .footer-section li {
            margin: 10px 0;
        }

        .footer-section a {
            color: rgba(255,255,255,0.8);
            text-decoration: none;
            transition: var(--transition);
        }

        .footer-section a:hover {
            color: var(--primary-light);
        }

        .footer-section i {
            width: 25px;
            color: var(--primary-light);
        }

        .footer-bottom {
            border-top: 1px solid rgba(255,255,255,0.1);
            padding-top: 30px;
            color: rgba(255,255,255,0.6);
            font-size: 0.9em;
        }

        .social-links {
            display: flex;
            gap: 15px;
            justify-content: center;
            margin-top: 20px;
        }

        .social-links a {
            width: 45px;
            height: 45px;
            border-radius: 50%;
            background: rgba(255,255,255,0.1);
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            text-decoration: none;
            transition: var(--transition);
            font-size: 1.2em;
        }

        .social-links a:hover {
            background: var(--primary);
            transform: translateY(-3px);
        }

        /* Mobile Responsive */
        @media (max-width: 992px) {
            .hero-content {
                grid-template-columns: 1fr;
                text-align: center;
            }

            .hero-text h1 {
                font-size: 2.2em;
            }

            .hero-badges {
                justify-content: center;
            }

            .hero-buttons {
                justify-content: center;
            }

            .hero-image {
                order: -1;
            }

            .hero-image img {
                max-width: 80%;
            }
        }

        @media (max-width: 768px) {
            .nav-links {
                display: none;
            }

            .section-title h2 {
                font-size: 2em;
            }

            .stats-grid {
                grid-template-columns: repeat(2, 1fr);
            }

            .stat-card .value {
                font-size: 2.5em;
            }

            .download-section {
                padding: 40px 20px;
            }

            .download-buttons {
                flex-direction: column;
                align-items: center;
            }
        }

        @media (max-width: 480px) {
            .hero-text h1 {
                font-size: 1.8em;
            }

            .stats-grid {
                grid-template-columns: 1fr;
            }

            .authors-grid {
                grid-template-columns: 1fr;
            }
        }

        /* Scroll Progress Bar */
        .scroll-progress {
            position: fixed;
            top: 0;
            left: 0;
            height: 4px;
            background: var(--gradient-accent);
            z-index: 1001;
            transition: width 0.1s;
        }
    </style>
</head>
<body>
    <!-- Animated Background -->
    <div class="bg-animation">
        <div class="particle" style="left: 10%; animation-delay: 0s;"></div>
        <div class="particle" style="left: 20%; animation-delay: 2s;"></div>
        <div class="particle" style="left: 30%; animation-delay: 4s;"></div>
        <div class="particle" style="left: 40%; animation-delay: 6s;"></div>
        <div class="particle" style="left: 50%; animation-delay: 8s;"></div>
        <div class="particle" style="left: 60%; animation-delay: 10s;"></div>
        <div class="particle" style="left: 70%; animation-delay: 12s;"></div>
        <div class="particle" style="left: 80%; animation-delay: 14s;"></div>
        <div class="particle" style="left: 90%; animation-delay: 16s;"></div>
    </div>

    <!-- Scroll Progress -->
    <div class="scroll-progress" id="scrollProgress"></div>

    <!-- Navigation -->
    <nav>
        <div class="container">
